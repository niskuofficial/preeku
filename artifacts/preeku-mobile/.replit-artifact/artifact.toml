kind = "mobile"
previewPath = "/mobile/"
title = "Preeku Mobile - Paper Trading"
version = "1.0.0"
id = "artifacts/preeku-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22590

[services.development]
run = "pnpm --filter @workspace/preeku-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/preeku-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/preeku-mobile", "run", "serve" ]

[services.env]
PORT = "22590"
BASE_PATH = "/mobile/"
