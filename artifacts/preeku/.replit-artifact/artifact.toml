kind = "web"
previewPath = "/"
title = "Preeku - Paper Trading Platform"
version = "1.0.0"
id = "artifacts/preeku"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25135

[services.development]
run = "pnpm --filter @workspace/preeku run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/preeku", "run", "build" ]
publicDir = "artifacts/preeku/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25135"
BASE_PATH = "/"
